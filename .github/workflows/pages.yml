name: Test and deploy static Command Centre

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint
      - run: npm run test:pairing
      - run: npm run test:workspace-router
      - run: npm run test:voice-gate
      - run: npm run test:model-router
      - run: npm run test:a2ui
      - run: npm run test:sandbox
      - run: npm run test:mobile-node
      - run: npm run test:doctor
      - run: npm run doctor
      - run: npm run test:skill-validator
      - run: npm run skills:validate -- skill-packs/local-review
      - run: npm run test:plugin-eval
      - run: npm run eval -- workflows/example-review.workflow.yaml
      - run: npm run test:docs-staleness
      - run: node scripts/docs-staleness.mjs --range HEAD^..HEAD
      - run: npm run test:frontmatter
      - run: npm run docs:frontmatter
      - run: npm run test:verification-gap
      - run: node scripts/verification-gap.mjs --range HEAD^..HEAD
      - run: npm run test:ssrf-guard
      - run: node scripts/build-static.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
